name: Android Build Check

on:
  pull_request:
    branches: [main, staging]
    paths:
      - '**.ts'
      - '**.vue'
      - '**.js'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - '.github/workflows/android-build.yml'
  push:
    branches: [main, staging]

jobs:
  build-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate static files
        run: npm run generate
      
      - name: Verify build output
        run: |
          if [ ! -d ".output/public" ]; then
            echo "Error: .output/public directory not found"
            exit 1
          fi
          
          if [ ! -f ".output/public/index.html" ]; then
            echo "Error: index.html not found in build output"
            exit 1
          fi
          
          echo "Build output verified successfully"
          ls -la .output/public/
      
      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      
      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists"
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Verify Android project structure
        run: |
          if [ ! -d "android" ]; then
            echo "Error: android directory not found"
            exit 1
          fi
          
          if [ ! -f "android/app/build.gradle" ]; then
            echo "Error: Android build.gradle not found"
            exit 1
          fi
          
          echo "Android project structure verified"
      
      - name: Check Android build (debug)
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
