name: PWA CI - Lint, Type Check, Tests, Build

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]

jobs:
  pwa-ci:
    name: Tablet Ordering PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure esbuild binary is available
        run: npm run rebuild:esbuild --if-present --silent || true

      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Type Check (Nuxt/Vue TSC)
        run: npx nuxi typecheck || npx vue-tsc --noEmit

      - name: Run unit tests (Vitest)
        run: npm test --if-present -- --run

      - name: Build PWA
        run: npm run build --if-present
        env:
          NITRO_PRESET: node-server

      - name: Generate static PWA
        run: npm run generate --if-present

      - name: Verify build output
        run: test -d .output && echo "Build successful" || (echo "Build output missing" && exit 1)
