name: PWA CI - Lint, Type Check, Tests, Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  pwa-ci:
    name: Tablet Ordering PWA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tablet-ordering-pwa

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tablet-ordering-pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure esbuild binary is available
        run: npm run rebuild:esbuild --if-present --silent || true

      - name: Lint (ESLint)
        run: npm run lint --if-present || true

      - name: Type Check (Nuxt/Vue TSC)
        run: npx nuxi typecheck || npx vue-tsc --noEmit || true

      - name: Run unit tests (Vitest)
        run: npm test --if-present -- --run || true

      - name: Build PWA
        run: npm run build --if-present

      - name: Verify build output
        run: test -d .output && echo "Build successful" || echo "Build output missing"
