services:
  tablet-pwa:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      TZ: UTC
      APP_RUNTIME_API_BASE_URL: ${APP_RUNTIME_API_BASE_URL:-/api}
      APP_RUNTIME_REVERB_HOST: ${APP_RUNTIME_REVERB_HOST:-}
      APP_RUNTIME_REVERB_APP_KEY: ${APP_RUNTIME_REVERB_APP_KEY:-}
      APP_RUNTIME_REVERB_PORT: ${APP_RUNTIME_REVERB_PORT:-443}
      APP_RUNTIME_REVERB_SCHEME: ${APP_RUNTIME_REVERB_SCHEME:-https}
      APP_RUNTIME_REVERB_PATH: ${APP_RUNTIME_REVERB_PATH:-/app}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "1"
    cpu_shares: 1024
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
      - /var/run/nginx
      - /var/cache/nginx
      - /var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tablet-network

networks:
  tablet-network:
    driver: bridge
