server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ================================================================
    # SPA Routing - All requests without extension go to index.html
    # ================================================================
    location / {
        try_files $uri $uri/ /index.html =404;
        
        # Cache HTML files minimally (check for updates frequently)
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header Content-Type "text/html; charset=utf-8" always;
    }

    # ================================================================
    # Asset Caching - Immutable content (versioned filenames)
    # ================================================================
    location ^~ /_nuxt/ {
        # Versioned assets (hash in filename) can be cached indefinitely
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires 1y;
    }

    # ================================================================
    # Static Assets - Images, fonts, icons (unversioned)
    # ================================================================
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        # Cache images for 1 week, but must revalidate
        add_header Cache-Control "public, max-age=604800, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires 7d;
    }

    location ~* \.(woff|woff2|ttf|eot)$ {
        # Cache fonts indefinitely (rarely change)
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        expires 1y;
    }

    # ================================================================
    # CSS & JavaScript (non-versioned)
    # ================================================================
    location ~* \.(js|css)$ {
        # Non-versioned CSS/JS: cache 1 hour, must revalidate
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ================================================================
    # Manifest & Favicons (check frequently)
    # ================================================================
    location ~* manifest\.webmanifest|favicon\.ico|apple-touch-icon {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ================================================================
    # Service Worker (no caching, always fresh)
    # ================================================================
    location = /runtime-config.js {
        alias /var/cache/nginx/runtime-config.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Content-Type "application/javascript" always;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Content-Type "application/javascript" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # ================================================================
    # Compression (gzip for text assets)
    # ================================================================
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;

    # ================================================================
    # Security Headers
    # ================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSP for PWA (allow service worker, allow reverb WebSocket)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; manifest-src 'self';" always;

    # ================================================================
    # Logging
    # ================================================================
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ================================================================
    # Error Pages
    # ================================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
